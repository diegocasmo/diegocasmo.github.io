  <style>
    html, body {
      width: 100%;
      height: 100%;
      min-height: 100%;
      min-width: 320px;
    }
    h1, h2, h3, h4, h5, h6, p, a, span {
      font-family: 'Space Mono', monospace, sans-serif;
    }
    .container {
      position: relative;
      width: 100%;
      height: 100%;
    }
    .card-container {
      width: 90%;
      max-width: 720px;
      margin: 0px auto;
      padding: 25px 0px 15px;
    }
    .card-avatar {
      width: 220px;
      height: auto;
      border-radius: 100%;
      display: block;
      margin: 0px auto;
    }
    .card-title {
      text-transform: uppercase;
      color: #3a3a3a;
      margin: 15px 0px;
    }
    .card-description {
      font-size: 18px;
      color: #505050;
      margin: 15px 0px;
    }
    .card-link__list,
    .social-networks__list {
      list-style: none;
      margin: 0px;
      padding: 0px;
    }
    .card_link__item,
    .social-network__item {
      display: inline-block;
      margin: 0px 10px 10px 0px;
    }
    .card_link__item:last-child,
    .social-network__item:last-child {
      margin-right: 0px;
    }
    .card_link__item-link {
      text-decoration: none;
      padding: 10px;
      border-radius: 2px;
      min-width: 80px;
      display: block;
      text-align: center;
      box-shadow: 0 0 10px 0 rgba(75, 75, 75, 0.3);
      -webkit-transition: all 0.2s ease-in-out;
      transition: all 0.2s ease-in-out;
      background: #282635;
      color: #f3f3f3;
    }
    .card_link__item-link:hover,
    .card_link__item-link:focus,
    .card_link__item-link:active {
      text-decoration: none;
      -webkit-transform: scale(1.1);
              transform: scale(1.1);
      background: #282635;
      color: #f3f3f3;
    }
    .social-network__item-link {
      width: 40px;
      height: 40px;
      line-height: 40px;
      background: white;
      border-radius: 100%;
      display: block;
      text-align: center;
      margin: 0px;
      padding: 0px;
      font-size: 28px;
      box-shadow: 0 0 10px 0 rgba(75, 75, 75, 0.3);
      -webkit-transition: all 0.2s ease-in-out;
      transition: all 0.2s ease-in-out;
      background: #282635;
      color: #f3f3f3;
    }
    .social-network__item-link:hover,
    .social-network__item-link:focus,
    .social-network__item-link:active {
      text-decoration: none;
      -webkit-transform: scale(1.2);
              transform: scale(1.2);
      background: #282635;
      color: #f3f3f3;
    }
    /* Tablet size */
    @media only screen and (min-width: 768px) {
      html, body {
        background-color: #282635;
      }
      .vertical-align {
        position: absolute;
        top: 50%;
        -webkit-transform: translateY(-50%);
        transform: translateY(-50%);
      }
      .card-container {
        left: 0px;
        right: 0px;
        background: #f3f3f3;
        box-shadow: 0 0 10px 0 rgba(40,40,40,0.3);
        padding: 15px;
      }
      .card-col-left {
        left: 20px;
      }
      .card-col-right {
        padding-left: 245px;
      }
    }
  </style>

  <div class="container">
