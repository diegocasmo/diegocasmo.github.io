name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist
          overwrite: true
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
      - name: Notify IndexNow (Bing, Yandex, et al.)
        continue-on-error: true
        env:
          INDEXNOW_KEY: 00e20f288adcd95eb830990321119c9c
        run: |
          # Runs after deploy-pages, so the new sitemap is live. Best-effort;
          # never fails the deploy. IndexNow reaches Bing (Copilot), Yandex, etc.
          urls=$(curl -sS --max-time 30 https://diegocasmo.github.io/sitemap-0.xml \
            | grep -oE '<loc>[^<]+</loc>' | sed -E 's|</?loc>||g' \
            | jq -R . | jq -cs .)
          if [ -z "$urls" ] || [ "$urls" = "null" ] || [ "$urls" = "[]" ]; then
            echo "No sitemap URLs found; skipping IndexNow"; exit 0
          fi
          curl -sS --max-time 30 -X POST https://api.indexnow.org/indexnow \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "{\"host\":\"diegocasmo.github.io\",\"key\":\"${INDEXNOW_KEY}\",\"keyLocation\":\"https://diegocasmo.github.io/${INDEXNOW_KEY}.txt\",\"urlList\":${urls}}" \
            || echo "IndexNow ping failed (non-fatal)"
